[package]
name = "openmindgraph"
version = "0.1.0"
description = "OpenMindGraph - LLM Scene Editor"
authors = []
edition = "2021"
rust-version = "1.77"

[lib]
name = "openmindgraph_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["stream", "json"] }
bytes = "1"
tokio = { version = "1", features = ["full"] }
futures = "0.3"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
